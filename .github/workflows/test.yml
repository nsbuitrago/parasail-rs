name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # build:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Build
  #       run: cargo build --verbose
  #     - name: Run tests
  #       run: cargo test --verbose

  aarch-build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [aarch64-unknown-linux-gnu, armv7-unknown-linux-gnueabihf]
    name: Build/Test for ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          profile: minimal
          override: true
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Setup linker
        run: |
          # Required to make Parasail build
          export CMAKE_POLICY_VERSION_MINIMUM="3.5"

          if [[ ! -z "$TARGET_CC" ]]; then
            export CC="$TARGET_CC"
            export AR="$TARGET_AR"
            export CXX="$TARGET_CXX"
            export BINDGEN_EXTRA_CLANG_ARGS="--sysroot $TARGET_SYSROOT"
          else
            export CFLAGS="-Wno-error"
            export CXXFLAGS="-Wno-error"
            export BINDGEN_EXTRA_CLANG_ARGS="-Wno-error"
          fi
      - name: Build
        run: cross build --verbose --target ${{ matrix.target }}
      - name: Run tests
        run: cross test --verbose --target ${{ matrix.target }}
